name: CI

on:
  push:
    branches:
      - main
      - dev
      - "feat/**"
      - "bugfix/**"
      - "hotfix/**"
      - "EC-*"
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  JAVA_VERSION: "17"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ecocycle-tn

jobs:
  build-test-sonar:
    name: Build, test and SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build, test and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          ./mvnw -B clean verify
          org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.qualitygate.wait=true

      - name: Upload application JAR
        uses: actions/upload-artifact@v4
        with:
          name: ecocycle-tn-jar
          path: target/app.jar
          if-no-files-found: error
          retention-days: 7

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/jacoco.xml
          if-no-files-found: error
          retention-days: 7

  dependency-check:
    name: Dependency check
    runs-on: ubuntu-latest
    needs: build-test-sonar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Generate dependency tree
        run: |
          mkdir -p target
          ./mvnw -B -DskipTests dependency:tree -DoutputFile=target/dependency-tree.txt

      - name: Upload dependency tree
        uses: actions/upload-artifact@v4
        with:
          name: dependency-tree
          path: target/dependency-tree.txt
          if-no-files-found: error
          retention-days: 7

  docker-build-scan-push:
    name: Docker build and GHCR push
    runs-on: ubuntu-latest
    needs: dependency-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download application JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: ecocycle-tn-jar
          path: target

      - name: Prepare Docker runtime context
        shell: bash
        run: |
          mkdir -p docker-context
          cp target/app.jar docker-context/app.jar
          cat > docker-context/Dockerfile <<'EOF'
          FROM eclipse-temurin:21-jre-alpine

          RUN addgroup -S spring && adduser -S spring -G spring

          WORKDIR /app
          COPY app.jar /app/app.jar
          RUN chown -R spring:spring /app

          USER spring:spring
          EXPOSE 8080

          ENV JAVA_OPTS="-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"

          HEALTHCHECK --interval=30s --timeout=5s --start-period=30s --retries=3 \
            CMD wget -qO- http://localhost:8080/actuator/health || exit 1

          ENTRYPOINT ["sh", "-c", "java $JAVA_OPTS -jar /app/app.jar"]
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Docker metadata
        id: docker_meta
        shell: bash
        run: |
          image_name="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          ref_name="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          safe_ref="$(echo "${ref_name}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+|-+$//g')"
          short_sha="${GITHUB_SHA::7}"

          {
            echo "image=${image_name}"
            echo "short_sha=${short_sha}"
            echo "safe_ref=${safe_ref}"
            echo "tags<<EOF"
            echo "${image_name}:${short_sha}"
            echo "${image_name}:${safe_ref}"
            if [[ "${GITHUB_REF_NAME}" == "dev" || "${GITHUB_REF_NAME}" == "main" ]]; then
              echo "${image_name}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          file: docker-context/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    name: Update GitOps manifests
    runs-on: ubuntu-latest
    needs: docker-build-scan-push
    if: github.event_name != 'pull_request'

    steps:
      - name: Prepare GitOps handoff
        run: |
          image_name="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "Image pushed for ${GITHUB_REF_NAME}:"
          echo "${image_name}:${GITHUB_SHA::7}"
          echo "GitOps manifest update will be enabled in EC-8 when k8s manifests are added."
