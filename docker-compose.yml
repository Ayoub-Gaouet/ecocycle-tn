services:
  mariadb:
    image: mariadb:11.4
    container_name: ecocycle-mariadb
    environment:
      MARIADB_DATABASE: ecocycle_tn
      MARIADB_USER: ecocycle
      MARIADB_PASSWORD: ecocycle
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    image: ecocycle/user-service:1.0.0
    build:
      context: .
    container_name: ecocycle-user-service
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mariadb://mariadb:3306/ecocycle_tn?createDatabaseIfNotExist=true
      DB_USERNAME: ecocycle
      DB_PASSWORD: ecocycle
      JWT_SECRET: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  mariadb-data:
